<svg width="170" height="170" viewBox="0 0 170 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="avatarClip">
      <circle cx="85" cy="85" r="65"/>
    </clipPath>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B967FF"/>
      <stop offset="35%" stop-color="#00E5FF"/>
      <stop offset="65%" stop-color="#B967FF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
  </defs>
  <g>
    <circle cx="85" cy="85" r="76" fill="none" stroke="url(#ringGrad)" stroke-width="5" stroke-linecap="round" stroke-dasharray="360 120">
      <animateTransform attributeName="transform" type="rotate" from="0 85 85" to="360 85 85" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="85" cy="85" r="68" fill="none" stroke="#0d0d0d" stroke-width="2" opacity="0.6"/>
    <image href="https://github.com/iyudhistira484-maker.png" x="20" y="20" width="130" height="130" clip-path="url(#avatarClip)"/>
    <circle cx="85" cy="85" r="65" fill="none" stroke="#B967FF" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>
